
services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ENV=linux
    volumes:
      - ./backend/app/env.yaml:/app/app/env.yaml:ro
      - ./backend/app/logs:/app/app/logs
      - chroma_data:/app/app/chroma_db
    networks:
      - resume_network

  # 前端服务
  frontend:
    build:
      context: ./resume_vue
      dockerfile: Dockerfile
    container_name: resume_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - resume_network
    depends_on:
      - backend

networks:
  resume_network:
    driver: bridge

volumes:
  chroma_data:
